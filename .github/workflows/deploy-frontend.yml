name: Frontend CI & Deploy

on:
  # 1. After Prettier auto-formats on push (covers src/*, *.ts, *.tsx, etc.)
  workflow_run:
    workflows: ["Prettier"]
    types: [completed]
    branches: [main]
  # 2. Direct push for files Prettier doesn't watch (configs, vercel.json, etc.)
  push:
    branches: [main]
    paths-ignore:
      - 'src/**'
      - '*.ts'
      - '*.tsx'
      - '*.js'
      - '*.jsx'
      - '*.css'
      - '*.md'
  # 3. PRs always run build check (no deploy)
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack & activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ── Build (runs on PRs too — catches broken builds before merge) ────
      - name: Build
        run: pnpm build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ── Bypass Vercel Hobby Plan restriction ─────────────────────────────
      - name: Rewrite commit author for Vercel
        if: github.event_name != 'pull_request'
        run: |
          git config user.email "83777943+adarsh-67r@users.noreply.github.com"
          git config user.name "Adarsh"
          git commit --amend --reset-author --no-edit

      # ── Deploy to Vercel ─────────────────────────────────────────────────
      - name: Pull Vercel environment
        if: github.event_name != 'pull_request'
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build via Vercel CLI
        if: github.event_name != 'pull_request'
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        if: github.event_name != 'pull_request'
        run: npx vercel@latest deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
