name: Prettier

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'src/**/*.js'
      - 'src/**/*.jsx'
      - 'src/**/*.css'
      - '*.json'
      - '*.md'
      - '*.yaml'
      - '*.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prettier:
    name: Format
    runs-on: ubuntu-latest
    # Skip if the commit was already made by this workflow to prevent loops
    if: "!contains(github.event.head_commit.message, 'style: auto-format with Prettier')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT so the auto-commit can trigger the deploy workflow
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack & activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Prettier
        run: pnpm format

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit formatted files
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.email "83777943+adarsh-67r@users.noreply.github.com"
          git config user.name "Adarsh"
          git add -A
          git commit -m "style: auto-format with Prettier"
          git push
