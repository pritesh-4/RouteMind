<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0A0A0A"/>

  <!-- Top route line -->
  <path
    d="M8 10C12 10 14 6 18 6H24"
    stroke="#404040"
    stroke-width="1.5"
    stroke-linecap="round"
  />

  <!-- Middle (active) route line -->
  <path
    d="M8 16H24"
    stroke="#0066FF"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Bottom route line -->
  <path
    d="M8 22C12 22 14 26 18 26H24"
    stroke="#555555"
    stroke-width="1.5"
    stroke-linecap="round"
  />

  <!-- Left router block -->
  <rect x="6" y="8" width="4" height="16" rx="1" fill="#555555" stroke="#555555" stroke-width="1.5"/>

  <!-- Left active dot -->
  <circle cx="8" cy="16" r="1.5" fill="#0066FF"/>

  <!-- Right top node -->
  <circle cx="24" cy="6" r="2" fill="#555555"/>

  <!-- Right active node -->
  <circle cx="24" cy="16" r="3" fill="#0066FF"/>

  <!-- Right bottom node -->
  <circle cx="24" cy="26" r="2" fill="#555555"/>
</svg>
